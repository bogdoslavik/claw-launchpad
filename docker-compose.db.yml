services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-claw_launchpad}
      POSTGRES_USER: ${POSTGRES_USER:-launchpad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-launchpad}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-launchpad} -d ${POSTGRES_DB:-claw_launchpad}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
